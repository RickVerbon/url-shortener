{% extends 'base.html' %}

{% block content %}
  <div class="container mt-5">
    <h1 class="mb-4">Create Shortened URL</h1>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="url">Original URL:</label>
            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text">https://</span>
                </div>
                <input type="text" class="form-control" name="url" placeholder="Enter full URL" required>
            </div>
        </div>

        <div class="form-group">
            <label for="shorten">Shorten:</label>
            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text">{{ domain }}/</span>
                </div>
                <input type="text" class="form-control" name="shorten" placeholder="Enter custom short part" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Create Shortened URL</button>
    </form>
    {% if messages %}
        <div class="container mt-3">
            {% for message in messages %}
                <div{% if message.tags %} class="alert alert-{{ message.tags }}"{% endif %} role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

  </div>
{% endblock %}
